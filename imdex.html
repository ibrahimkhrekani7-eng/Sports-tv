<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTV SPORT | NO ADS</title>
    <style>
        :root {
            --primary-color: #ffcc00;
            --bg-dark: #000000;
            --card-bg: #111111;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* بەشی ڤیدیۆ و قەڵغانی ڕیکلام */
        .player-wrapper {
            position: sticky;
            top: 0;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            z-index: 100;
            border-bottom: 3px solid var(--primary-color);
        }

        /* ئەم بەشە ڕێگری لە یەکەم کلیکی ڕیکلام دەکات */
        .ad-shield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 101;
            cursor: pointer;
        }

        .video-container { width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }

        .header-section { padding: 15px; background: var(--bg-dark); }
        .schedule-btn {
            width: 100%; background: var(--primary-color); color: #000;
            border: none; padding: 12px; font-weight: bold; border-radius: 5px;
        }

        .channel-list { display: flex; flex-direction: column; }
        .channel-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 20px; border-bottom: 1px solid #222; cursor: pointer;
        }

        .channel-item.active {
            background-color: #1a1a1a;
            border-right: 5px solid var(--primary-color);
        }
        
        .channel-item.active .channel-name { color: var(--primary-color); }
        .channel-badge {
            color: var(--primary-color); border: 2px solid var(--primary-color);
            padding: 5px 10px; border-radius: 4px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="player-wrapper" id="playerWrapper">
        <div class="ad-shield" id="adShield" onclick="removeShield()"></div>
        <div class="video-container">
            <iframe id="videoFrame" 
                    src="" 
                    sandbox="allow-forms allow-scripts allow-same-origin" 
                    allowfullscreen="true" 
                    webkitallowfullscreen="true" 
                    mozallowfullscreen="true"></iframe>
        </div>
    </div>

    <div class="header-section">
        <button class="schedule-btn">MTV SPORT - خشتەی یارییەکان</button>
    </div>

    <div class="channel-list" id="channelList"></div>

<script>
    const channels = [
        { name: "MTV SPORT 1", id: "68" },
        { name: "MTV SPORT 2", id: "2" },
        { name: "MTV SPORT 3", id: "1" },
        { name: "MTV SPORT 4", id: "3" },
        { name: "MTV SPORT 5", id: "73" },
        { name: "MTV SPORT 6", id: "74" },
        { name: "MTV SPORT 7", id: "75" },
        { name: "MTV SPORT 8", id: "76" },
        { name: "MTV SPORT 9", id: "69" },
        { name: "MTV SPORT 10", id: "70" }
    ];

    const grid = document.getElementById('channelList');
    const frame = document.getElementById('videoFrame');
    const shield = document.getElementById('adShield');

    channels.forEach((ch, index) => {
        const item = document.createElement('div');
        item.className = 'channel-item' + (index === 0 ? ' active' : '');
        item.innerHTML = `
            <div class="channel-name">${ch.name}</div>
            <div class="channel-badge">LIVE</div>
        `;
        item.onclick = () => {
            frame.src = `https://livetv.aflam4you.net/embed.php?vid=${ch.id}`;
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            shield.style.display = 'block'; // دووبارە چالاککردنەوەی قەڵغان بۆ چەناڵی نوێ
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        grid.appendChild(item);
    });

    // کارپێکردنی یەکەم چەناڵ
    frame.src = `https://livetv.aflam4you.net/embed.php?vid=${channels[0].id}`;

    function removeShield() {
        shield.style.display = 'none'; // لادانی قەڵغانەکە کاتێک کلیک دەکرێت بۆ ئەوەی پلەیەرەکە کار بکات
    }

    // ڕێگری لە کردنەوەی پەڕەی نوێ (تا ڕادەیەک)
    window.onbeforeunload = function() {
        return "ئایا دڵنیایت لە جێهێشتنی لاپەڕەکە؟";
    };
</script>

</body>
</html>
